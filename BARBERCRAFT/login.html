<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BarberCraft — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf6f0; --surface: #ffffff; --surface2: #f5f0e8; --border: #e8dfd0;
  --gold: #c9a84c; --gold-light: #a07830; --gold-dark: #a07830;
  --text: #1a1a1a; --muted: #888; --error: #c0392b;
}
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
 
.bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .12; animation: drift 12s ease-in-out infinite alternate; }
.bg-orb:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, #c9a84c, transparent 70%); top: -150px; left: -100px; animation-duration: 14s; }
.bg-orb:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, #6a4820, transparent 70%); bottom: -100px; right: -80px; animation-duration: 10s; animation-delay: -4s; }
.bg-orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, #c9a84c44, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 16s; }
@keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }
.bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.07) 1px, transparent 1px); background-size: 60px 60px; }
 
.page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
 
.card { width: 100%; max-width: 420px; background: rgba(255,255,255,0.97); border: 1px solid var(--border); border-radius: 24px; padding: 44px 40px 40px; backdrop-filter: blur(20px); box-shadow: 0 32px 80px rgba(0,0,0,0.10); animation: cardIn .6s cubic-bezier(.16,1,.3,1) both; }
@keyframes cardIn { from { opacity:0; transform:translateY(32px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
 
.logo-wrap { text-align: center; margin-bottom: 36px; }
.logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; box-shadow: 0 8px 32px rgba(201,168,76,0.35); }
.logo-name { font-family:'Playfair Display',serif; font-size: 26px; font-weight: 900; color: var(--gold); }
.logo-name span { color: var(--text); font-weight: 400; }
.logo-sub { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
 
.divider { font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:28px; display:flex; align-items:center; gap:12px; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
 
.error-box { background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); border-radius:10px; padding:12px 16px; font-size:13px; color:#e74c3c; margin-bottom:20px; display:none; gap:8px; align-items:center; }
.error-box.show { display:flex; animation:shake .35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
 
.field { margin-bottom:18px; }
.field label { display:block; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; opacity:.5; }
.field input { width:100%; height:52px; padding:0 44px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); outline:none; transition:border-color .2s,box-shadow .2s,background .2s; }
.field input::placeholder { color:#bbb; }
.field input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.12); background:#fffbf0; }
.field.err input { border-color:var(--error); box-shadow:0 0 0 3px rgba(231,76,60,0.1); }
.field-err { font-size:11px; color:var(--error); margin-top:6px; display:none; }
.field.err .field-err { display:block; }
 
.eye-btn { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; padding:4px; transition:color .2s; }
.eye-btn:hover { color:var(--gold); }
 
.btn-login { width:100%; height:54px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#000; border:none; border-radius:14px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:8px; }
.btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 32px rgba(201,168,76,0.4); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; }
.spinner { width:18px; height:18px; border:2px solid rgba(0,0,0,.3); border-top-color:#000; border-radius:50%; animation:spin .6s linear infinite; display:none; }
@keyframes spin { to { transform:rotate(360deg); } }
.btn-login.loading .btn-text { display:none; }
.btn-login.loading .spinner { display:block; }
 
.card-foot { text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); font-size:12px; color:#999; }
.card-foot a { color:var(--muted); text-decoration:none; }
.card-foot a:hover { color:var(--gold); }
.hint { text-align:center; margin-top:12px; font-size:12px; color:#aaa; }
.hint b { color:var(--gold); }
 
@media(max-width:480px) { .card { padding:36px 24px 32px; border-radius:20px; } }
</style>
</head>
<body>
 
<div class="bg-scene">
  <div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div>
  <div class="bg-grid"></div>
</div>
 
<div class="page">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">✂️</div>
      <div class="logo-name">Barber<span>Craft</span></div>
      <div class="logo-sub">Admin Portal</div>
    </div>
 
    <div class="divider">Secure Login</div>
 
    <div class="error-box" id="errBox">
      <span>🔒</span><span id="errMsg"></span>
    </div>
 
    <div class="field" id="f-user">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="uname" placeholder="Enter username" autocomplete="username"/>
      </div>
      <div class="field-err">Username is required</div>
    </div>
 
    <div class="field" id="f-pass">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="upass" placeholder="Enter password" autocomplete="current-password"/>
        <button class="eye-btn" type="button" onclick="toggleEye()">👁</button>
      </div>
      <div class="field-err">Password is required</div>
    </div>
 
    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <span class="btn-text">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:6px"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Enter Dashboard
      </span>
      <div class="spinner"></div>
    </button>
 
    <div class="card-foot">
      🔒 Admin only &nbsp;·&nbsp; <a href="index.html">← Customer Booking Page</a>
    </div>
  </div>
</div>
 
<script>
const AUTH_KEY     = 'bc_auth_token';
const LOCKOUT_KEY  = 'bc_lockout';
const CONFIG_KEY   = 'bc_config';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 5 * 60 * 1000;
 
function getCreds() {
  try {
    const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    return {
      username: cfg.admin_username || 'admin',
      password: cfg.admin_password || 'barber@123',
    };
  } catch {
    return { username: 'admin', password: 'barber@123' };
  }
}
 
(function() {
  try {
    if (localStorage.getItem(AUTH_KEY) === 'bc_logged_in') {
      window.location.href = 'owner.html';
    }
  } catch(e) {}
})();
 
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
 
function toggleEye() {
  const inp = document.getElementById('upass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  event.currentTarget.textContent = inp.type === 'text' ? '🙈' : '👁';
}
 
function markError(fieldId, yes) {
  document.getElementById(fieldId)?.classList.toggle('err', yes);
}
 
function showError(msg) {
  const box = document.getElementById('errBox');
  document.getElementById('errMsg').textContent = msg;
  box.classList.remove('show');
  void box.offsetHeight;
  box.classList.add('show');
}
 
function getLock() { try { return JSON.parse(localStorage.getItem(LOCKOUT_KEY)||'null'); } catch { return null; } }
function setLock(d) { localStorage.setItem(LOCKOUT_KEY, JSON.stringify(d)); }
function clearLock() { localStorage.removeItem(LOCKOUT_KEY); }
 
function doLogin() {
  const btn  = document.getElementById('btnLogin');
  document.getElementById('errBox').classList.remove('show');
  markError('f-user', false);
  markError('f-pass', false);
 
  const uname = document.getElementById('uname').value.trim();
  const upass = document.getElementById('upass').value;
 
  let ok = true;
  if (!uname) { markError('f-user', true); ok = false; }
  if (!upass) { markError('f-pass', true); ok = false; }
  if (!ok) return;
 
  const lock = getLock();
  if (lock && lock.until > Date.now()) {
    const mins = Math.ceil((lock.until - Date.now()) / 60000);
    showError('Account locked. Try again in ' + mins + ' min' + (mins > 1 ? 's' : '') + '.');
    return;
  }
 
  btn.classList.add('loading');
  btn.disabled = true;
 
  setTimeout(() => {
    const creds = getCreds();
 
    if (uname === creds.username && upass === creds.password) {
      clearLock();
      localStorage.setItem(AUTH_KEY, 'bc_logged_in');
      btn.style.background = 'linear-gradient(135deg,#2ecc71,#27ae60)';
      btn.innerHTML = '<span class="btn-text">✅ Access Granted — Redirecting...</span>';
      setTimeout(() => { window.location.href = 'owner.html'; }, 700);
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
      const ld = getLock() || { attempts: 0, until: 0 };
      ld.attempts = (ld.attempts || 0) + 1;
      if (ld.attempts >= MAX_ATTEMPTS) {
        ld.until = Date.now() + LOCKOUT_MS;
        ld.attempts = 0;
        setLock(ld);
        showError('Too many failed attempts. Locked for 5 minutes.');
      } else {
        setLock(ld);
        const left = MAX_ATTEMPTS - ld.attempts;
        showError('Wrong username or password. ' + left + ' attempt' + (left > 1 ? 's' : '') + ' left.');
      }
    }
  }, 900);
}
</script>
</body>
</html>
